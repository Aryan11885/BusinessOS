name: Frontend CI

on:
  push:
    branches:
      - feature/github-actions

  pull_request:
    branches:
      - feature/github-actions

jobs:
  frontend-build:
    name: Build Frontend

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: businessos-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build