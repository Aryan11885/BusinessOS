services:

  backend:
    build: ./businessos-backend
    container_name: businessos-backend

    ports:
      - "8000:8000"

    env_file:
      - ./businessos-backend/.env

  frontend:
    build: ./businessos-frontend
    container_name: businessos-frontend

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000

    depends_on:
      - backend